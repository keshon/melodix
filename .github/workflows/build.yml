# build.yml
name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goarch: amd64
            cc: gcc
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: src/go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc libopus-dev
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libopus-dev:arm64 || \
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build
        working-directory: src
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
          mkdir -p ../dist
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/keshon/buildinfo.Version=dev \
              -X github.com/keshon/buildinfo.Commit=${GIT_COMMIT} \
              -X github.com/keshon/buildinfo.BuildTime=${BUILD_DATE} \
              -X github.com/keshon/buildinfo.Project=Melodix \
              -X 'github.com/keshon/buildinfo.Description=Discord music bot that allows you to play music from YouTube, SoundCloud and internet radio streams.'" \
            -o ../dist/melodix-linux-${{ matrix.goarch }} \
            ./cmd/discord/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: melodix-linux-${{ matrix.goarch }}
          path: dist/melodix-linux-${{ matrix.goarch }}
          retention-days: 14