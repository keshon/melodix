name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Set binary name
        id: bin
        run: |
          NAME=melodix-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then NAME="${NAME}.exe"; fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -x
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
          mkdir -p dist
          ls -la ./cmd/
          go build -v -trimpath \
            -ldflags="-s -w \
              -X github.com/keshon/buildinfo.Version=dev \
              -X github.com/keshon/buildinfo.Commit=${GIT_COMMIT} \
              -X github.com/keshon/buildinfo.BuildTime=${BUILD_DATE} \
              -X github.com/keshon/buildinfo.Project=Melodix \
              -X 'github.com/keshon/buildinfo.Description=Discord music bot that allows you to play music from YouTube, SoundCloud and internet radio streams.'" \
            -o dist/${{ steps.bin.outputs.name }} \
            ./cmd/discord/
          ls -la dist/

      - name: Prepare build bundle
        run: |
          set -x
          PKG_ROOT="melodix-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${PKG_ROOT}"

          # Binary (renamed to melodix / melodix.exe inside the package)
          BIN_SRC="dist/${{ steps.bin.outputs.name }}"
          BIN_DST="melodix"
          if [ "${{ matrix.goos }}" = "windows" ]; then BIN_DST="melodix.exe"; fi
          cp "${BIN_SRC}" "${PKG_ROOT}/${BIN_DST}"

          # README and LICENSE
          cp README.md LICENSE "${PKG_ROOT}/"

          # .env from example
          if [ -f .env.example ]; then
            cp .env.example "${PKG_ROOT}/.env"
          fi

          # data directory (empty, datastore.json will be created on first run)
          mkdir -p "${PKG_ROOT}/data"

          # assets directory (optional, only if present in the repo)
          if [ -d assets ]; then
            cp -R assets "${PKG_ROOT}/"
          fi

          # Create zip archive with everything needed to run the bot
          mkdir -p dist
          zip -r "dist/${PKG_ROOT}.zip" "${PKG_ROOT}"
          ls -R "${PKG_ROOT}"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: melodix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/melodix-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 14