name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: src/go.sum

      - name: Set binary name
        id: bin
        run: |
          NAME=melodix-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then NAME="${NAME}.exe"; fi
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
          mkdir -p ../dist
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/keshon/buildinfo.Version=dev \
              -X github.com/keshon/buildinfo.Commit=${GIT_COMMIT} \
              -X github.com/keshon/buildinfo.BuildTime=${BUILD_DATE} \
              -X github.com/keshon/buildinfo.Project=Melodix \
              -X 'github.com/keshon/buildinfo.Description=Discord music bot that allows you to play music from YouTube, SoundCloud and internet radio streams.'" \
            -o ../dist/${{ steps.bin.outputs.name }} \
            ./cmd/discord/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.bin.outputs.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}