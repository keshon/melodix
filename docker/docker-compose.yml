services:
  app:
    container_name: ${ALIAS}
    restart: always
    image: '${ALIAS}-image'
    volumes:
      - ./data:/usr/project/data
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_BLACKLIST=${DISCORD_GUILD_BLACKLIST}
      - STORAGE_PATH=${STORAGE_PATH:-/usr/project/data/datastore.json}
      - INIT_SLASH_COMMANDS=${INIT_SLASH_COMMANDS}
      - DEVELOPER_ID=${DEVELOPER_ID}
      - VOICE_READY_DELAY_MS=${VOICE_READY_DELAY_MS:-500}
      - WS_SILENCE_TIMEOUT=${WS_SILENCE_TIMEOUT:-2m}
      - DISCORD_UNHEALTHY_MODE=${DISCORD_UNHEALTHY_MODE:-restart}
      - DISCORD_UNHEALTHY_GRACE=${DISCORD_UNHEALTHY_GRACE:-0}
      - DISCORD_UNHEALTHY_WINDOW=${DISCORD_UNHEALTHY_WINDOW:-1m}
      - COMMAND_TIMEOUT=${COMMAND_TIMEOUT:-30s}
      - COMMAND_PARALLELISM=${COMMAND_PARALLELISM:-16}
    entrypoint: ["/usr/project/app"]
    networks:
      - proxy

networks:
  proxy:
    external: true      